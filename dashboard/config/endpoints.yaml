_dashboard:
  default_endpoint: "profiles"

profiles:
  description: "HLAVO - moisture profiles"
  version: "1.0.0"
  reload_interval: 300

  source:
    type: "s3"
    store_type: "zarr"
    uri: "s3://hlavo-release/profiles.zarr"
    schema_path: "schemas/profile_schema.yaml"

  variable_map:
    Uhelna:
      profiles:
        lat: "latitude"
        lon: "longitude"
        time: "date_time"
        vertical: "depth_level"
        entity: "site_id"

  defaults:
    display_variable: "moisture"
    group_path: "/Uhelna/profiles"

  visualization:
    map:
      center_lat: 50.8645
      center_lon: 14.892
      zoom: 10
      title: "Uhelná site overview."
      point_size: 6
      alpha: 0.8
    timeseries:
      middle_window_days: 30
      right_window_hours: 24
    overlay:
      enabled: false
      tile_url: ""
      cache_dir: ""

  tile_build:
    enabled: false
    source_image: ""
    georef_file: ""
    vrt_file: ""
    warped_tif: ""
    rgba_vrt: ""
    tiles_dir: ""
    tile_scheme: "xyz"
    min_zoom: 0
    max_zoom: 20
    target_srs: "EPSG:3857"
    gcp_srs: "EPSG:4326"
    resampling: "near"
    add_alpha: true

wells:
  description: "HLAVO - measured and predicted water levels in wells"
  version: "1.0.0"
  reload_interval: 300

  source:
    type: "s3"
    store_type: "zarr"
    uri: "s3://hlavo-release/wells.zarr"
    schema_path: "schemas/wells_schema.yaml"

  variable_map:
    Uhelna:
      water_levels:
        lat: "latitude"
        lon: "longitude"
        time: "date_time"
        vertical: null
        entity: "well_id"

      water_draw:
        lat: "latitude"
        lon: "longitude"
        time: "date"
        vertical: null
        entity: "well_id"

      water_level_predicted:
        lat: "latitude"
        lon: "longitude"
        time: "date_time"
        vertical: "version"
        entity: "well_id"

  defaults:
    display_variable: "cum_draw"
    group_path: "/Uhelna/water_draw"

  visualization:
    map:
      center_lat: 50.869878
      center_lon: 14.866236
      zoom: 10
      title: "Geographic Data View"
      point_size: 10
      alpha: 0.8
    timeseries:
      middle_window_days: 30
      right_window_hours: 24
    overlay:
      enabled: false
      tile_url: ""
      cache_dir: ""

  tile_build:
    enabled: false
    source_image: ""
    georef_file: ""
    vrt_file: ""
    warped_tif: ""
    rgba_vrt: ""
    tiles_dir: ""
    tile_scheme: "xyz"
    min_zoom: 0
    max_zoom: 20
    target_srs: "EPSG:3857"
    gcp_srs: "EPSG:4326"
    resampling: "near"
    add_alpha: true

chmi_stations:
  description: "HLAVO - CHMI station and Open-Meteo forcing data"
  version: "1.0.0"
  reload_interval: 300

  source:
    type: "s3"
    store_type: "zarr"
    uri: "s3://hlavo-release/chmi_stations.zarr"
    schema_path: "schemas/chmi_stations_schema.yaml"

  variable_map:
    Uhelna:
      raw_data:
        open_meteo:
          lat: "latitude"
          lon: "longitude"
          time: "date_time"
          vertical: null
          entity: "site_id"

        chmi_stations:
          lat: "latitude"
          lon: "longitude"
          time: "date_time"
          vertical: null
          entity: "station_id"

      parflow:
        version_01:
          lat: "latitude"
          lon: "longitude"
          time: "date_time"
          vertical: null
          entity: "site_id"

  defaults:
    display_variable: "APCP"
    group_path: "/Uhelna/parflow/version_01"

  visualization:
    map:
      center_lat: 50.8645
      center_lon: 14.892
      zoom: 10
      title: "CHMI station and Open-Meteo forcing data"
      point_size: 8
      alpha: 0.8
    timeseries:
      middle_window_days: 30
      right_window_hours: 24
    overlay:
      enabled: false
      tile_url: ""
      cache_dir: ""

  tile_build:
    enabled: false
    source_image: ""
    georef_file: ""
    vrt_file: ""
    warped_tif: ""
    rgba_vrt: ""
    tiles_dir: ""
    tile_scheme: "xyz"
    min_zoom: 0
    max_zoom: 20
    target_srs: "EPSG:3857"
    gcp_srs: "EPSG:4326"
    resampling: "near"
    add_alpha: true

surface_forecast:
  description: "HLAVO - automatic surface meteorology forecasts"
  version: "1.0.0"
  reload_interval: 300

  source:
    type: "s3"
    store_type: "zarr"
    uri: "s3://hlavo-release/hlavo-release.zarr"
    schema_path: "schemas/hlavo_surface_schema.yaml"

  variable_map:
    yr.no:
      lat: "latitude"
      lon: "longitude"
      time: "date_time"
      vertical: null
      entity: "lat_lon"

    chmi_aladin_10m:
      lat: "latitude"
      lon: "longitude"
      time: "date_time"
      vertical: null
      entity: "longitude"

  defaults:
    display_variable: "air_temperature"
    group_path: "/yr.no"

  visualization:
    map:
      center_lat: 50.8645
      center_lon: 14.892
      zoom: 10
      title: "Surface meteorology forecasts"
      point_size: 6
      alpha: 0.8
    timeseries:
      middle_window_days: 7
      right_window_hours: 24
    overlay:
      enabled: false
      tile_url: ""
      cache_dir: ""

  tile_build:
    enabled: false
    source_image: ""
    georef_file: ""
    vrt_file: ""
    warped_tif: ""
    rgba_vrt: ""
    tiles_dir: ""
    tile_scheme: "xyz"
    min_zoom: 0
    max_zoom: 20
    target_srs: "EPSG:3857"
    gcp_srs: "EPSG:4326"
    resampling: "near"
    add_alpha: true
    
