      z: 4.0

  materials:
    all:
      # AGENT: document each parameter here (a demo file)
      # Comment quantity name and unit according to modflow6 documentation.
      # Put parameters that does not apply to volumetric materials out of the all section
      # logic should be that what is in all is applied to all materials as common/default value
      horizontal_conductivity: 1.0e-06
      vertical_conductivity: 1.0e-06
      porosity: 0.3
      vG_n: 2.0
      vG_alpha: 1.0
      recharge_rate: 0.0001
      vks: 1.0e-06
      thtr: 0.05
      thts: 0.3
      thti: 0.2
      eps: 3.5
      surfdep: 0.0
      pet: 0.0
      extdp: 1.0
      extwc: 0.1
      ha: 0.0
      hroot: 0.0
      rootact: 0.0
      ntrailwaves: 7
      nwavesets: 40
      simulate_et: false
      unsat_etwc: false
      unsat_etae: false
      simulate_gwseep: true
      hydraulic_conductivity: 1.0e-06
      specific_yield: 0.1
      specific_storage: 1.0e-05
      initial_head_offset: -1.0
      perlen: 1.0
      nstp: 1
      tsmult: 1.0
