    surface: ../../hlavo/ingress/meteo_playground/chmi_stations/chmi_stations_schema.yaml
  kalman_config:
    model_time_step: 2.5e-2
    state_params:
      pressure_field:
        mean_linear:
          top: -40
          bottom: -100  # top, bottom
        cov_exponential:
          std: 2.0
        rel_std_Q: 0.007
