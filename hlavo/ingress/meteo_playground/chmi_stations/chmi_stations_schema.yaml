ATTRS:
  S3_ENDPOINT_URL: "https://s3.cl4.du.cesnet.cz"
#  S3_STORE_URL: "s3://hlavo-release/hlavo-release.zarr"
  #  note:  STORE_URL: "s3://<bucket>>/<zarr_storage>"
  #    STORE_URL: "s3://hlavo-release/profiles.zarr"
  STORE_URL: "s3://hlavo-release/chmi_stations.zarr"
  #    STORE_URL: "file:///home/paulie/Workspace/HLAVO/tests/ingress/moist_profile/test_storage/"

  grid_min: [50.840000, 14.850000] # unit deg
  grid_max: [50.8900000, 14.9600000] # unit deg
  grid_step: [1e-2, 1e-2] # unit deg; about 1000m; approximately resolution of the yr.no service

  # longitude, latitude; about 100m precision
  meteo_domain_min: [14.6556, 50.6916]
  meteo_domain_max: [15.1817, 50.9800]


parflow_input:
  VARS:
    APCP:
      unit: "mm/s"
      description: "Total precipitation rate for ParFlow/CLM"
      df_col: "APCP"
      coords: [ "date_time" ]

    Temp:
      unit: "K"
      description: "Air temperature for ParFlow/CLM"
      df_col: "Temp"
      coords: [ "date_time" ]

    UGRD:
      unit: "m/s"
      description: "Eastward wind component for ParFlow/CLM"
      df_col: "UGRD"
      coords: [ "date_time" ]

    VGRD:
      unit: "m/s"
      description: "Northward wind component for ParFlow/CLM"
      df_col: "VGRD"
      coords: [ "date_time" ]

    Press:
      unit: "Pa"
      description: "Atmospheric pressure for ParFlow/CLM"
      df_col: "Press"
      coords: [ "date_time" ]

    SPFH:
      unit: "kg/kg"
      description: "Specific humidity for ParFlow/CLM"
      df_col: "SPFH"
      coords: [ "date_time" ]

    DSWR:
      unit: "W / m ** 2"
      description: "Downward shortwave radiation for ParFlow/CLM"
      df_col: "DSWR"
      coords: [ "date_time" ]

    DLWR:
      unit: "W / m ** 2"
      description: "Downward longwave radiation for ParFlow/CLM"
      df_col: "DLWR"
      coords: [ "date_time" ]
  COORDS:
    date_time:
      chunk_size: 1024
      #      sorted: None
      merge:
        step_limits: [ 1, 1, "m" ]

    latitude:
      chunk_size: 32
      #      sorted: None
      merge:
        step_limits: [ 0.0001, 0.0001, "degrees" ]

    longitude:
      #      sorted: None
      chunk_size: 32
      merge:
        step_limits: [ 0.0001, 0.0001, "degrees" ]


open_meteo:
  VARS:
    temperature_2m:
      unit: "degC"
      description: "Open-Meteo air temperature at 2 m"
      df_col: "temperature_2m"
      coords: [ "date_time", latitude, longitude ]

    relative_humidity_2m:
      unit: "%"
      description: "Open-Meteo relative humidity at 2 m"
      df_col: "relative_humidity_2m"
      coords: [ "date_time", latitude, longitude ]

    cloud_cover:
      unit: "%"
      description: "Open-Meteo total cloud cover"
      df_col: "cloud_cover"
      coords: [ "date_time", latitude, longitude ]

    precipitation:
      unit: "mm"
      description: "Open-Meteo hourly total precipitation"
      df_col: "precipitation"
      coords: [ "date_time", latitude, longitude ]

    surface_pressure:
      unit: "hPa"
      description: "Open-Meteo surface pressure"
      df_col: "surface_pressure"
      coords: [ "date_time", latitude, longitude ]

    wind_speed_10m:
      unit: "m/s"
      description: "Open-Meteo wind speed at 10 m"
      df_col: "wind_speed_10m"
      coords: [ "date_time", latitude, longitude ]

    wind_direction_10m:
      unit: "degree"
      description: "Open-Meteo wind direction at 10 m"
      df_col: "wind_direction_10m"
      coords: [ "date_time", latitude, longitude ]

    shortwave_radiation:
      unit: "W / m ** 2"
      description: "Open-Meteo shortwave radiation"
      df_col: "shortwave_radiation"
      coords: [ "date_time", latitude, longitude ]

    direct_radiation:
      unit: "W / m ** 2"
      description: "Open-Meteo direct radiation"
      df_col: "direct_radiation"
      coords: [ "date_time", latitude, longitude ]

    diffuse_radiation:
      unit: "W / m ** 2"
      description: "Open-Meteo diffuse radiation"
      df_col: "diffuse_radiation"
      coords: [ "date_time", latitude, longitude ]

    dlwr_estimate:
      unit: "W / m ** 2"
      description: "Estimated downward longwave radiation from Open-Meteo temperature, humidity, and cloud cover"
      df_col: "dlwr_estimate"
      coords: [ "date_time", latitude, longitude ]
  COORDS:
    date_time:
      chunk_size: 1024
      merge:
        step_limits: [ 1, 1, "m" ]

    latitude:
      chunk_size: 32
      merge:
        step_limits: [ 0.0001, 0.0001, "degrees" ]

    longitude:
      chunk_size: 32
      merge:
        step_limits: [ 0.0001, 0.0001, "degrees" ]


