active_scrappers:
  - name: hlavo-surface-forecast
    schema_path: schemas/hlavo_surface_schema.yaml
    target_node: yr.no
    extract_fn: normalize
    fn_module: inputs.extract.hlavo_extract

    runs:
      - cron: "15 1 * * *"
      - cron: "45 9 * * *"
      - cron: "15 13 * * *"
      - cron: "45 20 * * *"

    request:
      method: GET
      url: "https://api.met.no/weatherapi/locationforecast/2.0/complete"
      headers:
        - header_name: "User-Agent"
          header_value: "MyWeatherApp/1.0 (your_email@example.com)"
      query_params:
        - name: lat
          value: "{dflat}"
        - name: lon
          value: "{dflon}"

    iterate:
      - name: dataframe_row
        source: dataframe
        dataframe_path: dataframes/hlavo_surface_dataframe.csv
        dataframe_has_header: true
        outputs:
          dflat: dflat
          dflon: dflon

  - name: chmi-aladin-1km
    schema_path: schemas/hlavo_surface_schema.yaml
    target_node: chmi_aladin_10m
    extract_fn: extractor
    fn_module: hlavo.ingress.scrapper.extract.chmi_aladin_1km_extract

    runs:
      - cron: "52 4 * * *"
        set:
          time: "00"
      - cron: "52 11 * * *"
        set:
          time: "06"
      - cron: "52 13 * * *"
        set:
          time: "12"
      - cron: "52 20 * * *"
        set:
          time: "18"

    request:
      method: GET
      url: "https://opendata.chmi.cz/meteorology/weather/nwp_aladin/CZ_1km/{time}/ALADCZ1K4opendata_{date}{time}_{quantity}.grb.bz2"

    render:
      - name: date
        source: datetime_utc
        format: "%Y%m%d"

    iterate:
      - name: quantity
        source: schema
        target_node: "chmi_aladin_10m"
        schema_regex: "VARS.*.df_col"
