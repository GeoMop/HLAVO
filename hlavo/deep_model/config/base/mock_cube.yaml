qgis_project_path: "/dev/null"
boundary_layer_name: "mock"
# Domain XY clip polygon
raster_group_name: "mock"

grid_output_path: "grid_materials.npz"
material_parameters_output_path: "material_parameters.npz"

meshsteps:
  x: 10.0
  y: 10.0
  z:
    start: 1.0
    factor: 2.0
    # multiply mesh step between layers
    max: 1.0

model:
  model_name: "mock_cube"
  workspace: "model"
  # Output subdirectory for model input/output files.
  sim_name: "mock_cube"
  # Base name used for MODFLOW package/listing files.
  exe_name: "mf6"
  drain_conductance: 0.5
  # Drain conductance [m2/day].
  simulation_days: 20.0
  stress_periods_days: [5.0, 5.0, 10.0]
  recharge_series_m_per_day: [0.0001, 0.00005, 0.0]

mock:
  nx: 8
  ny: 8
  nz: 6
  delr: 10.0
  delc: 10.0
  delz: [0.5, 0.5, 1.0, 1.0, 2.0, 2.0]
  top: 100.0
  layer_names: [sand_1, clay_1, sand_2, clay_2, sand_3, clay_3]
  material_by_layer: [0, 1, 2, 3, 4, 5]
  material_class_by_layer: [1, 2, 1, 2, 1, 2]
  material_name_by_layer: [sand_1, clay_1, sand_2, clay_2, sand_3, clay_3]
  hk_by_layer: [1.0e-4, 1.0e-6, 8.0e-5, 1.0e-6, 5.0e-5, 1.0e-6]
  kv_by_layer: [8.0e-5, 5.0e-7, 6.0e-5, 5.0e-7, 4.0e-5, 5.0e-7]
  porosity_by_layer: [0.33, 0.42, 0.32, 0.42, 0.31, 0.42]
  vg_alpha_by_layer: [1.2, 0.5, 1.1, 0.5, 1.0, 0.5]
  vg_n_by_layer: [2.2, 1.3, 2.1, 1.3, 2.0, 1.3]

materials:
  all:
    horizontal_conductivity: 1.0e-6
    # Horizontal saturated hydraulic conductivity kh [m/day].
    vertical_conductivity: 1.0e-6
    # Vertical saturated hydraulic conductivity kv [m/day].
    porosity: 0.3
    # Effective porosity [-].
    vG_n: 2.0
    # van Genuchten n shape parameter [-].
    vG_alpha: 1.0
    # van Genuchten alpha parameter [1/m].
    recharge_rate: 0.00005
    # Areal recharge rate at top boundary [m/day].
    vks: 1.0e-6
    # Vertical saturated hydraulic conductivity for UZF [m/day].
    thtr: 0.05
    # Residual volumetric water content theta_r [-].
    thts: 0.3
    # Saturated volumetric water content theta_s [-]; usually close to porosity but may be lower due to entrapped air.
    thti: 0.2
    # Initial volumetric water content theta_i [-]; must lie between thtr and thts.
    eps: 3.5
    # UZF/Brooks-Corey exponent epsilon [-].
    surfdep: 0.0
    # UZF surface depression depth [m].
    pet: 0.0
    # Potential evapotranspiration rate [m/day].
    extdp: 1.0
    # ET extinction depth [m].
    extwc: 0.1
    # ET extinction water content [-].
    ha: 0.0
    # ET air-entry pressure head parameter [m].
    hroot: 0.0
    # ET root-pressure head parameter [m].
    rootact: 0.0
    # ET root activity coefficient [-].
    ntrailwaves: 7
    # Number of trailing waves in UZF solution (integer).
    nwavesets: 40
    # Number of wave sets in UZF solution (integer).
    simulate_et: false
    # Enable evapotranspiration simulation in UZF.
    unsat_etwc: false
    # Use water-content based ET function (UNSAT_ETWC option).
    unsat_etae: false
    # Use capillary-pressure based ET function (UNSAT_ETAE option).
    simulate_gwseep: true
    # Enable groundwater seepage to land surface in UZF.
    vertical_conductivity: 1.0e-6
    # Vertical saturated hydraulic conductivity kv [m/day].
    specific_yield: 0.1
    # Specific yield Sy [-].
    specific_storage: 1.0e-5
    # Specific storage Ss [1/m].
    initial_head_offset: 0.0
    # Initial head offset added to layer tops [m].

paraview:
  output_dir: "paraview"
  quantities: [head, hk, idomain, materials, material_class, velocity, q, velocity_magnitude, active]
  include_inactive: false
  # Include into plots.
  z_scale: 1.0
  # output Z scaling

  groundwater_surface_timeseries: true
  # Export groundwater-surface time series for all saved times.
  groundwater_surface_timeseries_name: uhelna_gw_surface_timeseries.pvd
  # File name of ParaView groundwater-surface time-series index.
plots:
  xsection_points: []
  xsection_wells:
    - pumping_well_1
  enabled: true
  output_dir: "plots"
  dpi: 150
  active_mask_name: "grid_active_mask.pdf"
  idomain_name: "idomain_top.pdf"
  head_name: "head_groundplan.pdf"
  groundwater_surface_name: "groundwater_surface.pdf"
  groundwater_change_name: "groundwater_change.pdf"
  hydrograph_name: "groundwater_hydrograph.pdf"
  xsection_x_name: "materials_x_section.pdf"
  xsection_y_name: "materials_y_section.pdf"
  xsection_x_times_name: "groundwater_x_section_times.pdf"
  xsection_y_times_name: "groundwater_y_section_times.pdf"
  xsection_depth_window: 15.0

wells:
  - name: pumping_well_1
    location:
      type: direct
      lon: 14.8973297
      lat: 50.8674447
    intervals:
      - top_depth: 10.0
        bottom_depth: 30.0
        rate_m3_per_day: -1.0
