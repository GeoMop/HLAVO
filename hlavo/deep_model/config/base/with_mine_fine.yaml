qgis_project_path: /home/jb/GIS/uhelna_all.qgs
boundary_layer_name: domain_with_mine
# Domain XY clip polygon
raster_group_name: HG model layers
grid_output_path: grid_materials.npz
material_parameters_output_path: material_parameters.npz
meshsteps:
  x: 40.0
  y: 40.0
  z:
    start: 0.3
    factor: 2.0
    # multiply mesh step between layers
    max: 4.8
model:
  model_name: with_mine_fine
  workspace: model
  # Output subdirectory for model input/output files.
  sim_name: uhelna
  # Base name used for MODFLOW package/listing files.
  exe_name: mf6
  drain_conductance: 1.0
  # Drain conductance [m2/day].
  simulation_days: 30.0
  stress_periods_days:
  - 5.0
  - 10.0
  - 15.0
materials:
  strict_layer_mapping: false
  # Enforce strict matching between raster interfaces and declared material layers.
  all:
    horizontal_conductivity: 1.0e-06
    # Horizontal saturated hydraulic conductivity kh [m/day].
    vertical_conductivity: 1.0e-06
    # Vertical saturated hydraulic conductivity kv [m/day].
    porosity: 0.3
    # Effective porosity [-].
    vG_n: 2.0
    # van Genuchten n shape parameter [-].
    vG_alpha: 1.0
    # van Genuchten alpha parameter [1/m].
    recharge_rate: 0.0001
    # Areal recharge rate at top boundary [m/day].
    vks: 1.0e-06
    # Vertical saturated hydraulic conductivity for UZF [m/day].
    thtr: 0.05
    # Residual volumetric water content theta_r [-].
    thts: 0.3
    # Saturated volumetric water content theta_s [-]; usually close to porosity but may be lower due to entrapped air.
    thti: 0.2
    # Initial volumetric water content theta_i [-]; must lie between thtr and thts.
    eps: 3.5
    # UZF/Brooks-Corey exponent epsilon [-].
    surfdep: 0.0
    # UZF surface depression depth [m].
    pet: 0.0
    # Potential evapotranspiration rate [m/day].
    extdp: 1.0
    # ET extinction depth [m].
    extwc: 0.1
    # ET extinction water content [-].
    ha: 0.0
    # ET air-entry pressure head parameter [m].
    hroot: 0.0
    # ET root-pressure head parameter [m].
    rootact: 0.0
    # ET root activity coefficient [-].
    ntrailwaves: 7
    # Number of trailing waves in UZF solution (integer).
    nwavesets: 40
    # Number of wave sets in UZF solution (integer).
    simulate_et: false
    # Enable evapotranspiration simulation in UZF.
    unsat_etwc: false
    # Use water-content based ET function (UNSAT_ETWC option).
    unsat_etae: false
    # Use capillary-pressure based ET function (UNSAT_ETAE option).
    simulate_gwseep: true
    # Enable groundwater seepage to land surface in UZF.
    specific_yield: 0.1
    # Specific yield Sy [-].
    specific_storage: 1.0e-05
    # Specific storage Ss [1/m].
    initial_head_offset: -1.0
    # Initial head offset added to layer tops [m].
  sets:
    sands:
      horizontal_conductivity: 1.0e-05
      vertical_conductivity: 1.0e-05
      porosity: 0.33
      vG_n: 2.3
      vG_alpha: 1.2
    clays:
      horizontal_conductivity: 1.0e-07
      vertical_conductivity: 1.0e-07
      porosity: 0.42
      vG_n: 1.35
      vG_alpha: 0.55
  layers:
  - name: sand_1
    top_interface: relief
    bottom_interface: Q1_top
    set: sands
  - name: clay_1
    top_interface: Q1_top
    bottom_interface: Q1_base
    set: clays
  - name: sand_2
    top_interface: Q1_base
    bottom_interface: Q2_top
    set: sands
  - name: clay_2
    top_interface: Q2_top
    bottom_interface: Q2_base
    set: clays
  - name: sand_3
    top_interface: Q2_base
    bottom_interface: Q3_top
    set: sands
  - name: clay_3
    top_interface: Q3_top
    bottom_interface: Q3_base
    set: clays
  - name: sand_4
    top_interface: Q3_base
    bottom_interface: Q5_top
    set: sands
  - name: clay_5
    top_interface: Q5_top
    bottom_interface: Q5_base
    set: clays
  - name: sand_6
    top_interface: Q5_base
    bottom_interface: Q6_top
    set: sands
  - name: clay_6
    top_interface: Q6_top
    bottom_interface: Q6_base
    set: clays
  - name: sand_7
    top_interface: Q6_base
    bottom_interface: Q_base
    set: sands
paraview:
  output_dir: paraview
  quantities:
    - groundwater_surface_change
    - head
    - hk
    - idomain
    - materials
    - velocity
    - q
    - velocity_magnitude
    - active
  include_inactive: false
  # Include into plots.
  z_scale: 5.0
  # output Z scaling
  groundwater_surface_timeseries: true
  # Export groundwater-surface time series for all saved times.
  groundwater_surface_timeseries_name: uhelna_gw_surface_timeseries.pvd
  # File name of ParaView groundwater-surface time-series index.
plots:
  xsection_points: []
  xsection_wells:
    - pumping_well_1
  enabled: true
  output_dir: plots
  dpi: 150
  active_mask_name: grid_active_mask.pdf
  idomain_name: idomain_top.pdf
  head_name: head_groundplan.pdf
  groundwater_surface_name: groundwater_surface.pdf
  groundwater_change_name: groundwater_change.pdf
  hydrograph_name: groundwater_hydrograph.pdf
  xsection_x_name: materials_x_section.pdf
  xsection_y_name: materials_y_section.pdf
  xsection_x_times_name: groundwater_x_section_times.pdf
  xsection_y_times_name: groundwater_y_section_times.pdf
  xsection_depth_window: 40.0

wells:
  - name: pumping_well_1
    location:
      type: direct
      lon: 14.8973297
      lat: 50.8674447
    intervals:
      - top_depth: 10.0
        bottom_depth: 30.0
        rate_m3_per_day: -1.0
