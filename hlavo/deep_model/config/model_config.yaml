# Model configuration
# Update paths to match your environment.

qgis_project_path: "/home/jb/GIS/uhelna_all.qgs"  # example: /data/gis/uhelna_all.qgz
boundary_layer_name: "domain_around_mine"     # example: JB_extended_domain
raster_group_name: "HG model layers"          # example: HG model layers

grid_output_path: "grid_materials.npz"
material_parameters_output_path: "material_parameters.npz"

meshsteps:
  x: 40.0  # example: 25.0
  y: 40.0  # example: 25.0
  z: 4.0   # example: 1.0

model:
  model_name: "around_mine_fine"
  workspace: "model"
  sim_name: "uhelna"
  exe_name: "mf6"
  # Optional Paraview outputs
  # paraview_results_output: "model/uhelna_results.vtu"
  # paraview_grid_output: "model/uhelna_materials.vtr"
  paraview:
    quantities: [head, hk, idomain, materials, velocity, q, velocity_magnitude, active]
    include_inactive: false
    z_scale: 1.0
  drain_conductance: 1.0
  simulation_days: 1.0
  stress_periods_days: [1.0]

# Material groups for parameter assignment.
# layers: GIS names of bottom interfaces in HG model layers group.
materials:
  all:
    layers: []
    horizontal_conductivity: 1.0e-6
    vertical_conductivity: 1.0e-6
    porosity: 0.30
    vG_n: 2.0
    vG_alpha: 1.0
    recharge_rate: 0.0001  # 0.1 mm/day in m/day
    vks: 1.0e-6
    thtr: 0.05
    thts: 0.3
    thti: 0.2
    eps: 3.5
    surfdep: 0.0
    pet: 0.0
    extdp: 1.0
    extwc: 0.1
    ha: 0.0
    hroot: 0.0
    rootact: 0.0
    ntrailwaves: 7
    nwavesets: 40
    simulate_et: false
    unsat_etwc: false
    unsat_etae: false
    simulate_gwseep: true
    hydraulic_conductivity: 1.0e-6
    specific_yield: 0.1
    specific_storage: 1.0e-5
    initial_head_offset: -1.0
    perlen: 1.0
    nstp: 1
    tsmult: 1.0
  sand:
    layers: ["relief"]
    horizontal_conductivity: 1.0e-5
    vertical_conductivity: 1.0e-5
  clay:
    layers: ["Q1_top"]
    horizontal_conductivity: 1.0e-7
    vertical_conductivity: 1.0e-7

plots:
  enabled: true
  output_dir: "plots"
  dpi: 150
  active_mask_name: "grid_active_mask.png"
  idomain_name: "idomain_top.png"
  head_name: "head_groundplan.png"
  xsection_x_name: "materials_x_section.png"
  xsection_y_name: "materials_y_section.png"
  # Optional fixed indices for cross-sections (0-based). If omitted, the mid index is used.
  # xsection_y_index: 80
  # xsection_x_index: 60
