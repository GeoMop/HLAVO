name: HLAVO Dashboard - pull request

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/hlavo-deploy-reusable.yaml
    needs:
      - lint-helm-chart
      - get-version-tag
      - containerize-backend
      - containerize-frontend
    with:
      zarr_repo: GeoMop/zarr_fuse
      zarr_ref: feature/hlavo-integration
      source_repo: ${{ github.repository }}
      source_ref: ${{ github.ref }}
      endpoints_path: dashboard/config/endpoints.yaml
      schemas_dir: dashboard/schemas
      version_tag: ${{ needs.get-version-tag.outputs.version-tag }}
      backend_image: jbrezmorf/hlavo-dashboard-ui-backend
      frontend_image: jbrezmorf/hlavo-dashboard-ui-frontend
      s3_access_key: ${{ secrets.S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.S3_SECRET_KEY }}
    secrets:
      kubeconfig: ${{ secrets.KUBECONFIG }}
      source_repo_token: ${{ secrets.GITHUB_TOKEN }}
      zarr_repo_token: ${{ secrets.GITHUB_TOKEN }}
      image: docker.io/alpine/k8s:1.29.14
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-lint-helm-chart"
      cancel-in-progress: true
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Lint helm chart
        uses: ./main-repo/.github/actions/helm-lint
        with:
          working-directory: main-repo/dashboard/charts/holoviz
