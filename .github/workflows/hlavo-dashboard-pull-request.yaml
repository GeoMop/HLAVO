name: HLAVO Dashboard - pull request

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  get-version-tag:
    name: Get version tag
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.get_version_tag.outputs.version-tag }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-get-version-tag
      cancel-in-progress: true
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Get version tag
        id: get_version_tag
        working-directory: main-repo
        run: |
          echo "version-tag=ci-$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

  containerize-backend:
    name: Containerize HLAVO backend
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildah/stable:v1.35.4
      options: --privileged
    needs:
      - get-version-tag
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-containerize-backend"
      cancel-in-progress: true
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Containerize
        uses: ./main-repo/.github/actions/containerize
        with:
          repository: jbrezmorf/hlavo-dashboard-ui-backend
          tag: ${{ needs.get-version-tag.outputs.version-tag }}
          containerfile-path: main-repo/dashboard/oci/backend.Containerfile
          push: true
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          working-directory: main-repo

  containerize-frontend:
    name: Containerize HLAVO frontend
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildah/stable:v1.35.4
      options: --privileged
    needs:
      - get-version-tag
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-containerize-frontend"
      cancel-in-progress: true
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Containerize
        uses: ./main-repo/.github/actions/containerize
        with:
          repository: jbrezmorf/hlavo-dashboard-ui-frontend
          tag: ${{ needs.get-version-tag.outputs.version-tag }}
          containerfile-path: main-repo/dashboard/oci/frontend.Containerfile
          push: true
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          working-directory: main-repo

  lint-helm-chart:
    name: Lint HoloViz Helm chart
    runs-on: ubuntu-latest
    container:
      image: docker.io/alpine/k8s:1.29.14
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-lint-helm-chart"
      cancel-in-progress: true
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Lint helm chart
        uses: ./main-repo/.github/actions/helm-lint
        with:
          working-directory: main-repo/dashboard/charts/holoviz

  deploy:
    name: Deploy HLAVO dashboard
    runs-on: ubuntu-latest
    container:
      image: docker.io/alpine/k8s:1.29.14
    needs:
      - lint-helm-chart
      - get-version-tag
      - containerize-backend
      - containerize-frontend
    env:
      KUBECONFIG: ./kubeconfig.yaml
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-deploy"
      cancel-in-progress: false
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration
          path: main-repo

      - name: Decode kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml && chmod 600 kubeconfig.yaml

      - name: Ensure namespace exists
        run: kubectl create namespace hlavo-dashboard-ui --dry-run=client -o yaml | kubectl apply -f -

      - name: Set context
        run: kubectl config set-context --current --namespace=hlavo-dashboard-ui

      - name: Deploy app
        run: |
          helm upgrade hlavo-dashboard-ui main-repo/dashboard/charts/holoviz \
          --install --atomic --timeout 10m --namespace hlavo-dashboard-ui \
          --set backend.image.name="jbrezmorf/hlavo-dashboard-ui-backend" \
          --set frontend.image.name="jbrezmorf/hlavo-dashboard-ui-frontend" \
          --set backend.image.tag="${{ needs.get-version-tag.outputs.version-tag }}" \
          --set frontend.image.tag="${{ needs.get-version-tag.outputs.version-tag }}" \
          --set backend.s3.secrets.accessKey="${{ secrets.S3_ACCESS_KEY }}" \
          --set backend.s3.secrets.secretKey="${{ secrets.S3_SECRET_KEY }}"