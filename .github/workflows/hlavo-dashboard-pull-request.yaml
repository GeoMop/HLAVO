name: HLAVO Dashboard - pull request

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  get-version-tag:
    name: Get version tag
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.get_version_tag.outputs.version-tag }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-get-version-tag
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration

      - name: Get version tag
        id: get_version_tag
        run: |
          echo "version-tag=ci-$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

  containerize-frontend:
    name: Containerize HLAVO frontend
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildah/stable:v1.35.4
      options: --privileged
    needs:
      - get-version-tag
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-containerize-frontend"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration

      - name: Containerize
        uses: ./.github/actions/containerize
        with:
          repository: jbrezmorf/hlavo-dashboard-ui-frontend
          tag: ${{ needs.get-version-tag.outputs.version-tag }}
          containerfile-path: dashboard/oci/frontend.Containerfile
          push: true
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}
          working-directory: .

  lint-helm-chart:
    name: Lint HoloViz Helm chart
    runs-on: ubuntu-latest
    container:
      image: docker.io/alpine/k8s:1.29.14
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}-lint-helm-chart"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: GeoMop/zarr_fuse
          ref: feature/hlavo-integration

      - name: Lint helm chart
        uses: ./.github/actions/helm-lint
        with:
          working-directory: dashboard/charts/holoviz

  deploy:
    uses: ./HLAVO/.github/workflows/hlavo-deploy-reusable.yaml
    needs:
      - lint-helm-chart
      - get-version-tag
      - containerize-frontend
    with:
      zarr_repo: GeoMop/zarr_fuse
      zarr_ref: feature/hlavo-integration
      source_repo: ${{ github.repository }}
      source_ref: ${{ github.ref }}
      endpoints_path: dashboard/config/endpoints.yaml
      schemas_dir: dashboard/schemas
      version_tag: ${{ needs.get-version-tag.outputs.version-tag }}
      frontend_image: jbrezmorf/hlavo-dashboard-ui-frontend
    secrets:
      kubeconfig: ${{ secrets.KUBECONFIG }}
      source_repo_token: ${{ secrets.GITHUB_TOKEN }}
      zarr_repo_token: ${{ secrets.GITHUB_TOKEN }}
      s3_access_key: ${{ secrets.S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.S3_SECRET_KEY }}