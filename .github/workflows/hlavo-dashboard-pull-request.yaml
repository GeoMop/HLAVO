name: HLAVO Dashboard - pull request

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    uses: GeoMop/zarr_fuse/.github/workflows/dashboard-reusable-workflow.yaml@feature/dashboard-multiple-selection
    with:
      zarr_repo: GeoMop/zarr_fuse
      zarr-fuse-ref: feature/dashboard-multiple-selection
      source_repo: ${{ github.repository }}
      source_ref: ${{ github.ref }}
      configuration-dir-path: dashboard/config
      frontend_image: jbrezmorf/hlavo-dashboard-ui-frontend
      namespace: hlavo-dashboard-ui
      deploy: true
      push-container: true
      tag: generate
      workflow_name: HLAVO reusable deploy
      containerize_job_name: Containerize HLAVO frontend
      deploy_job_name: Deploy HLAVO (reusable)
      release-name: hlavo-dashboard-ui
      configmap_name: hlavo-dashboard-config
      mount-volume-name: hlavo-config
      mount-endpoints-path: /opt/hlavo/dashboard/config/endpoints.yaml
      mount-schemas-path: /opt/hlavo/dashboard/schemas
      mount-env-name: ENDPOINTS_PATH
    secrets:
      kubeconfig: ${{ secrets.KUBECONFIG }}
      source_repo_token: ${{ secrets.GITHUB_TOKEN }}
      zarr_repo_token: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      s3_access_key: ${{ secrets.S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.S3_SECRET_KEY }}