name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker
        run: |
          set -euo pipefail
          docker info > /dev/null

      - name: Pull base image
        run: |
          set -euo pipefail
          bash dev/hlavo-build pull

      - name: Build venv overlay
        run: |
          set -euo pipefail
          bash dev/hlavo-build venv

      - name: Run tests
        run: |
          set -euo pipefail
          bash dev/hlavo run pytest tests
