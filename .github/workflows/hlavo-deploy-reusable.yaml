name: HLAVO reusable deploy

on:
  workflow_call:
    inputs:
      zarr_repo:
        description: 'zarr_fuse repository (owner/repo)'
        required: false
        type: string
        default: 'GeoMop/zarr_fuse'
      zarr_ref:
        description: 'ref for zarr_fuse (branch or commit)'
        required: false
        type: string
        default: 'feature/hlavo-integration'
      source_repo:
        description: 'Repository containing endpoints and schemas (owner/repo)'
        required: true
        type: string
      source_ref:
        description: 'Git ref in source repo (branch or commit)'
        required: true
        type: string
      endpoints_path:
        description: 'Path to endpoints.yaml inside source repo'
        required: true
        type: string
      schemas_dir:
        description: 'Path to schemas directory inside source repo'
        required: true
        type: string
      version_tag:
        description: 'Image tag / version to deploy'
        required: true
        type: string
      backend_image:
        description: 'Backend image name'
        required: true
        type: string
      frontend_image:
        description: 'Frontend image name'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace to deploy into'
        required: false
        type: string
        default: 'hlavo-dashboard-ui'
    secrets:
      kubeconfig:
        required: true
      source_repo_token:
        required: true
      zarr_repo_token:
        required: false
      s3_access_key:
        required: true
      s3_secret_key:
        required: true

jobs:
  deploy:
    name: Deploy HLAVO (reusable)
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: ./kubeconfig.yaml
    steps:
      - name: Checkout zarr_fuse (main-repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.zarr_repo }}
          ref: ${{ inputs.zarr_ref }}
          path: main-repo
          token: ${{ secrets.zarr_repo_token }}

      - name: Checkout source repo (HLAVO or caller)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: source-repo
          token: ${{ secrets.source_repo_token }}

      - name: Decode kubeconfig
        run: echo "${{ secrets.kubeconfig }}" | base64 -d > kubeconfig.yaml && chmod 600 kubeconfig.yaml

      - name: Validate source files
        run: |
          echo "Checking endpoints and schemas in source repo: ${{ inputs.source_repo }}@$${{ inputs.source_ref }}"
          ls -l "source-repo/${{ inputs.endpoints_path }}" || (echo "MISSING endpoints.yaml" && exit 1)
          ls -l "source-repo/${{ inputs.schemas_dir }}" || (echo "MISSING schemas dir" && exit 1)

      - name: Create ConfigMap from source files
        run: |
          kubectl create configmap hlavo-dashboard-config \
            --namespace "${{ inputs.namespace }}" \
            --from-file=endpoints.yaml=source-repo/${{ inputs.endpoints_path }} \
            --from-file=source-repo/${{ inputs.schemas_dir }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm chart from main-repo
        run: |
          helm upgrade hlavo-dashboard-ui main-repo/dashboard/charts/holoviz \
            --install --atomic --timeout 10m --namespace "${{ inputs.namespace }}" \
            --set backend.image.name="${{ inputs.backend_image }}" \
            --set frontend.image.name="${{ inputs.frontend_image }}" \
            --set backend.image.tag="${{ inputs.version_tag }}" \
            --set frontend.image.tag="${{ inputs.version_tag }}" \
            --set backend.s3.secrets.accessKey="${{ secrets.s3_access_key }}" \
            --set backend.s3.secrets.secretKey="${{ secrets.s3_secret_key }}" \
            --set backend.extraEnv[0].name="ENDPOINTS_PATH" \
            --set backend.extraEnv[0].value="/opt/hlavo/dashboard/config/endpoints.yaml" \
            --set backend.extraVolumes[0].name="hlavo-config" \
            --set backend.extraVolumes[0].configMap.name="hlavo-dashboard-config" \
            --set backend.extraVolumeMounts[0].name="hlavo-config" \
            --set backend.extraVolumeMounts[0].mountPath="/opt/hlavo/dashboard/config/endpoints.yaml" \
            --set backend.extraVolumeMounts[0].subPath="endpoints.yaml" \
            --set backend.extraVolumeMounts[1].name="hlavo-config" \
            --set backend.extraVolumeMounts[1].mountPath="/opt/hlavo/dashboard/schemas" \
            --set frontend.extraEnv[0].name="ENDPOINTS_PATH" \
            --set frontend.extraEnv[0].value="/opt/hlavo/dashboard/config/endpoints.yaml" \
            --set frontend.extraVolumes[0].name="hlavo-config" \
            --set frontend.extraVolumes[0].configMap.name="hlavo-dashboard-config" \
            --set frontend.extraVolumeMounts[0].name="hlavo-config" \
            --set frontend.extraVolumeMounts[0].mountPath="/opt/hlavo/dashboard/config/endpoints.yaml" \
            --set frontend.extraVolumeMounts[0].subPath="endpoints.yaml" \
            --set frontend.extraVolumeMounts[1].name="hlavo-config" \
            --set frontend.extraVolumeMounts[1].mountPath="/opt/hlavo/dashboard/schemas"
